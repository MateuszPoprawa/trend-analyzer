name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      ACR_NAME: acrnews5c5i1
      IMAGE_NAME: streamlit

    steps:

      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      - name: Build Docker Image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            ./frontend

      - name: Push Docker Image
        run: |
          docker push \
            $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name frontend-news-trends \
            --resource-group rg-news-trends \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}